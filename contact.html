<html>
    <head>
        <main>
    <section>
        <h2>Contact Us</h2>

        <form>
            <label for="name">Ashley G & Isabella D:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">agendaflow@nycgmail.com:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5"></textarea><br><br>

            <button type="submit">Submit</button>
        </form>
    </section>
</main>
    </head>
    <body>
    <style>body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f6f8;
    color: #333;
    line-height: 1.6;
}

/* ========== HEADER ========== */
header {
    background: linear-gradient(135deg, #5a4a39, #ffffff);
    color: rgb(228, 203, 175);
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

header p {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* ========== NAVIGATION ========== */
nav {
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: #775a44;
}

/* ========== MAIN ========== */
main {
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 20px;
}

/* ========== SECTIONS ========== */
section {
    background: white;
    padding: 25px;
    margin-bottom: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

section h2 {
    margin-bottom: 15px;
    color: #876655;
}

section h3 {
    margin-top: 15px;
    color: #68543c;
}

/* ========== IMAGES ========== */
img {
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
}

/* ========== FORM (CONTACT PAGE) ========== */
form {
    display: flex;
    flex-direction: column;
}

input, textarea {
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 1rem;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #2a5298;
}

/* BUTTON */
button {
    background-color: #886956;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #675543;
}

/* ========== FOOTER ========== */
footer {
    background-color: #1e3c72;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

footer p {
    margin: 5px 0;
}</style>

</html>
