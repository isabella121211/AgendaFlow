        <style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    color: #333;
    line-height: 1.6;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

/* NAV */
nav {
    background: white;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
}

nav a:hover {
    color: #00c6ff;
}

/* MAIN */
main {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
}

/* SECTIONS */
section {
    background: white;
    padding: 25px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

/* HEADINGS */
h2 {
    margin-bottom: 15px;
    color: #0077cc;
}

h3 {
    margin-top: 15px;
    color: #333;
}

/* LIST */
ul {
    margin-left: 20px;
}

/* FOOTER */
footer {
    background: #0077cc;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}</style>
